name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      # 1. Le decimos que instale las cosas DENTRO de la carpeta frontend
      - name: Install Dependencies
        run: npm ci
        working-directory: frontend

      # 2. Le decimos que construya el proyecto DENTRO de la carpeta frontend
      - name: Build Project
        run: npm run build
        working-directory: frontend

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_BITMARKET_96C82 }}
          channelId: live
          projectId: bitmarket-96c82
